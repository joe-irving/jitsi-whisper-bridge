# Whisper Bridge Configuration

server:
  host: "0.0.0.0"  # Bind to localhost (nginx proxies to this)
  port: 9000
  ping_interval: 20
  ping_timeout: 20
  max_size: 10485760  # 10MB

whisper:
  url: "http://whisper.cpp:8090/inference"
  # url: "https://whisper.example.com:8443/inference"  # If remote
  timeout: 30
  sample_rate: 16000
  chunk_duration_ms: 3000  # 3 seconds for better recognition
  silence_threshold: 50

jwt:
  enabled: false
  public_key_path: "/etc/whisper-public-key.pem"
  audience: "whisper-service"

language:
  # Special code that triggers auto-detection in Whisper
  auto_detect_code: "auto"
  default: "en"

hallucination_filter:
  enabled: false
